<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-row-full {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        input[type="number"] {
            font-family: 'Arial', sans-serif;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-reset {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .btn-reset:hover {
            background: #e8e8e8;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result-survived {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }
        
        .result-not-survived {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }
        
        .result-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .result-message {
            font-size: 1em;
            margin-bottom: 10px;
        }
        
        .result-probability {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 3px;
            color: #555;
            font-size: 0.9em;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚢 Titanic Survival Prediction</h1>
        <p class="subtitle">Predict if a passenger survived the Titanic disaster</p>
        
        <div class="info-box">
            ℹ️ Enter passenger details below to predict survival probability
        </div>
        
        <form id="predictionForm" method="POST" action="/predict">
            <!-- Passenger Class & Gender -->
            <div class="form-row">
                <div class="form-group">
                    <label for="pclass">Passenger Class</label>
                    <select id="pclass" name="pclass" required>
                        <option value="">Select Class</option>
                        <option value="1">1st Class</option>
                        <option value="2">2nd Class</option>
                        <option value="3">3rd Class</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="sex">Gender</label>
                    <select id="sex" name="sex" required>
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>
            
            <!-- Age & Fare -->
            <div class="form-row">
                <div class="form-group">
                    <label for="age">Age (years)</label>
                    <input type="number" id="age" name="age" min="0" max="120" step="0.1" placeholder="e.g., 25" required>
                </div>
                
                <div class="form-group">
                    <label for="fare">Fare Paid (£)</label>
                    <input type="number" id="fare" name="fare" min="0" step="0.01" placeholder="e.g., 7.75" required>
                </div>
            </div>
            
            <!-- Family Members -->
            <div class="form-row">
                <div class="form-group">
                    <label for="sibsp">Siblings/Spouse Aboard</label>
                    <input type="number" id="sibsp" name="sibsp" min="0" max="10" value="0" required>
                </div>
                
                <div class="form-group">
                    <label for="parch">Parents/Children Aboard</label>
                    <input type="number" id="parch" name="parch" min="0" max="10" value="0" required>
                </div>
            </div>
            
            <!-- Title & Embarked Port -->
            <div class="form-row">
                <div class="form-group">
                    <label for="title">Title</label>
                    <select id="title" name="title" required>
                        <option value="">Select Title</option>
                        <option value="Mr">Mr</option>
                        <option value="Mrs">Mrs</option>
                        <option value="Miss">Miss</option>
                        <option value="Master">Master</option>
                        <option value="Rare">Rare</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="embarked">Port of Embarkation</label>
                    <select id="embarked" name="embarked" required>
                        <option value="">Select Port</option>
                        <option value="C">Cherbourg (C)</option>
                        <option value="Q">Queenstown (Q)</option>
                        <option value="S">Southampton (S)</option>
                    </select>
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-predict">📊 Predict</button>
                <button type="reset" class="btn-reset">Clear</button>
            </div>
        </form>
        
        <!-- Result Display -->
        <div id="result" class="result">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-message" id="resultMessage"></div>
            <div class="result-probability" id="resultProbability"></div>
        </div>
    </div>
    
    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                Pclass: parseInt(formData.get('pclass')),
                Sex: formData.get('sex'),
                Age: parseFloat(formData.get('age')),
                Fare: parseFloat(formData.get('fare')),
                SibSp: parseInt(formData.get('sibsp')),
                Parch: parseInt(formData.get('parch')),
                Title: formData.get('title'),
                Embarked: formData.get('embarked')
            };
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                displayResult(result);
            } catch (error) {
                console.error('Error:', error);
                alert('Error making prediction. Please try again.');
            }
        });
        
        function displayResult(result) {
            const resultDiv = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');
            const resultProbability = document.getElementById('resultProbability');
            
            if (result.survived === 1) {
                resultDiv.className = 'result show result-survived';
                resultTitle.textContent = '✅ SURVIVED';
                resultMessage.textContent = 'This passenger likely survived the Titanic disaster.';
            } else {
                resultDiv.className = 'result show result-not-survived';
                resultTitle.textContent = '❌ DID NOT SURVIVE';
                resultMessage.textContent = 'This passenger likely did not survive the Titanic disaster.';
            }
            
            resultProbability.textContent = `Prediction Probability: ${(result.probability * 100).toFixed(2)}%`;
            
            // Scroll to result
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
